<!DOCTYPE html>
<!--
  Webcam frame - Counter-Strike tactical HUD theme (purple/magenta)
  OBS: add as Browser Source, set Width/Height + position to EXACTLY match your
  Webcam source box, then place this above the Webcam in the scene.
  Background is transparent, so your camera shows through the center.
  Edit the handle text below (look for ZEVON).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600&display=swap');

  :root {
    --p1: #c026ff;          /* purple */
    --p2: #ff2bd6;          /* magenta */
    --glow: 0 0 12px rgba(192,38,255,.8), 0 0 24px rgba(255,43,214,.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  .frame { position: absolute; inset: 0; }

  /* animated edge lines */
  .edge { position: absolute; background: linear-gradient(90deg, transparent, var(--p1), var(--p2), transparent);
          background-size: 200% 100%; animation: flow 3s linear infinite; box-shadow: var(--glow); }
  .edge.top    { top: 0;    left: 6%; right: 6%; height: 3px; }
  .edge.bottom { bottom: 0; left: 6%; right: 6%; height: 3px; }
  .edge.left   { left: 0;  top: 6%; bottom: 6%; width: 3px;
                 background: linear-gradient(180deg, transparent, var(--p1), var(--p2), transparent); background-size: 100% 200%; animation: flowV 3s linear infinite; }
  .edge.right  { right: 0; top: 6%; bottom: 6%; width: 3px;
                 background: linear-gradient(180deg, transparent, var(--p1), var(--p2), transparent); background-size: 100% 200%; animation: flowV 3s linear infinite; }
  @keyframes flow  { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  @keyframes flowV { from { background-position: 0 200%; } to { background-position: 0 -200%; } }

  /* tactical L-corners */
  .corner { position: absolute; width: 38px; height: 38px; border: 3px solid var(--p2);
            filter: drop-shadow(0 0 6px rgba(255,43,214,.9)); animation: pulse 2.2s ease-in-out infinite; }
  .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }

  /* LIVE tab */
  .live { position: absolute; top: -2px; left: 26px; display: flex; align-items: center; gap: 7px;
          padding: 4px 12px 4px 10px; background: rgba(10,5,16,.9);
          clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
          border-bottom: 2px solid var(--p2); }
  .live .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff2b4b; box-shadow: 0 0 8px #ff2b4b; animation: blink 1.1s steps(1) infinite; }
  .live span { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 3px; color: #fff; }
  @keyframes blink { 50% { opacity: .25; } }

  /* handle bar */
  .handle { position: absolute; bottom: -2px; right: 22px; display: flex; align-items: center; gap: 8px;
            padding: 3px 14px; background: rgba(10,5,16,.9);
            clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 100%);
            border-top: 2px solid var(--p1); }
  .handle .tag { font-family: 'Teko', sans-serif; font-weight: 600; font-size: 22px; line-height: 1;
                 letter-spacing: 2px; color: #fff; text-shadow: var(--glow); }
  .handle .tri { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 9px solid var(--p2); }

  /* faint scan sweep across the whole box */
  .scan { position: absolute; inset: 0; overflow: hidden; }
  .scan::after { content: ''; position: absolute; left: 0; right: 0; height: 120px;
                 background: linear-gradient(180deg, transparent, rgba(192,38,255,.10), transparent);
                 animation: sweep 5s linear infinite; }
  @keyframes sweep { from { top: -120px; } to { top: 100%; } }
</style>
</head>
<body>
  <div class="frame">
    <div class="scan"></div>
    <div class="edge top"></div><div class="edge bottom"></div>
    <div class="edge left"></div><div class="edge right"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="live"><div class="dot"></div><span>LIVE</span></div>
    <div class="handle"><div class="tri"></div><div class="tag">ZEVON</div></div>
  </div>
</body>
</html>
