<!DOCTYPE html>
<!--
  Webcam frame - PRINTSTREAM theme (white / black / chrome holo)
  OBS: add as Browser Source, size + position to match your Webcam box, place
  it ABOVE the Webcam source. Center is transparent. Edit handle (ZEVON).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Teko:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

  /* shared holo gradient */
  :root { --holo: linear-gradient(110deg,#ff3d8b,#ff8a3d,#f5e63d,#3dff8a,#3dd0ff,#8a3dff,#ff3d8b); }

  .frame { position: absolute; inset: 0; }

  /* white printstream edges with a holographic sheen running through */
  .edge { position: absolute; background: #f4f4f6; box-shadow: 0 0 8px rgba(0,0,0,.35); }
  .edge::after { content: ''; position: absolute; inset: 0; background: var(--holo); background-size: 300% 100%;
                 mix-blend-mode: screen; opacity: .85; animation: holo 6s linear infinite; }
  .edge.top    { top: 0;    left: 5%; right: 5%; height: 4px; }
  .edge.bottom { bottom: 0; left: 5%; right: 5%; height: 4px; }
  .edge.left   { left: 0;  top: 5%; bottom: 5%; width: 4px; }
  .edge.right  { right: 0; top: 5%; bottom: 5%; width: 4px; }
  @keyframes holo { to { background-position: 300% 0; } }

  /* black ink-streak L-corners with a chrome inner edge */
  .corner { position: absolute; width: 42px; height: 42px; border: 5px solid #0d0d0f; }
  .corner::before { content: ''; position: absolute; width: 100%; height: 100%;
                    border: 2px solid #fff; opacity: .9; }
  .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .corner.tl::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
  .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .corner.tr::before { top: 3px; right: 3px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .corner.bl::before { bottom: 3px; left: 3px; border-right: none; border-top: none; }
  .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
  .corner.br::before { bottom: 3px; right: 3px; border-left: none; border-top: none; }

  /* LIVE tab - white plate, black text, holo strip */
  .live { position: absolute; top: -1px; left: 24px; display: flex; align-items: center; gap: 7px;
          padding: 4px 13px 4px 10px; background: #f4f4f6;
          clip-path: polygon(0 0,100% 0,88% 100%,0 100%); }
  .live::before { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 3px;
                  background: var(--holo); background-size: 300% 100%; animation: holo 6s linear infinite; }
  .live .dot { width: 9px; height: 9px; border-radius: 50%; background: #e21c1c; box-shadow: 0 0 7px #e21c1c; animation: blink 1.1s steps(1) infinite; }
  .live span { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 3px; color: #0d0d0f; }
  @keyframes blink { 50% { opacity: .25; } }

  /* handle - black plate, chrome text */
  .handle { position: absolute; bottom: -1px; right: 20px; display: flex; align-items: center; gap: 8px;
            padding: 3px 15px; background: #0d0d0f; clip-path: polygon(12% 0,100% 0,100% 100%,0 100%); }
  .handle::before { content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 3px;
                    background: var(--holo); background-size: 300% 100%; animation: holo 6s linear infinite; }
  .handle .tag { font-family: 'Teko', sans-serif; font-weight: 700; font-size: 23px; line-height: 1; letter-spacing: 2px;
                 background: linear-gradient(180deg,#fff 0%,#cfcfd6 42%,#80808a 52%,#cfcfd6 60%,#fff 100%);
                 -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
</head>
<body>
  <div class="frame">
    <div class="edge top"></div><div class="edge bottom"></div>
    <div class="edge left"></div><div class="edge right"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="live"><div class="dot"></div><span>LIVE</span></div>
    <div class="handle"><div class="tag">ZEVON</div></div>
  </div>
</body>
</html>
