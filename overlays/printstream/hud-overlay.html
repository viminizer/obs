<!DOCTYPE html>
<!--
  In-game HUD - PRINTSTREAM theme (white/black/chrome holo).
  Transparent center. OBS: Browser Source 1920x1080, place ON TOP of the scene.
  Edit text below (ZEVON / socials / map line).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Teko:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent;
               font-family: 'Rajdhani', sans-serif; }
  :root { --holo: linear-gradient(110deg,#ff3d8b,#ff8a3d,#f5e63d,#3dff8a,#3dd0ff,#8a3dff,#ff3d8b); }
  @keyframes holo { to { background-position: 300% 0; } }

  .plate { position: absolute; background: #f4f4f6; box-shadow: 0 2px 10px rgba(0,0,0,.4); }
  .plate::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 3px;
                  background: var(--holo); background-size: 300% 100%; animation: holo 6s linear infinite; }

  .chrome { background: linear-gradient(180deg,#fff 0%,#cfcfd6 42%,#80808a 52%,#cfcfd6 60%,#fff 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            filter: drop-shadow(0 1px 0 rgba(0,0,0,.3)); }

  /* top-left brand */
  .brand { top: 34px; left: 34px; display: flex; align-items: center; gap: 12px; padding: 10px 20px 12px 14px;
           clip-path: polygon(0 0,100% 0,94% 100%,0 100%); }
  .brand .mark { width: 28px; height: 28px; transform: rotate(45deg); background: #0d0d0f; }
  .brand .name { font-family: 'Teko', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: 2px; line-height: 1; color: #0d0d0f; }

  /* top-right live */
  .live { top: 34px; right: 34px; display: flex; align-items: center; gap: 10px; padding: 10px 16px 12px;
          clip-path: polygon(6% 0,100% 0,100% 100%,0 100%); }
  .live .dot { width: 11px; height: 11px; border-radius: 50%; background: #e21c1c; box-shadow: 0 0 8px #e21c1c; animation: blink 1.1s steps(1) infinite; }
  .live .txt { font-weight: 700; letter-spacing: 3px; font-size: 18px; color: #0d0d0f; }
  .live .sep { width: 1px; height: 20px; background: rgba(0,0,0,.25); }
  .live .ct  { font-weight: 700; letter-spacing: 1px; font-size: 17px; color: #2a2a2e; }
  @keyframes blink { 50% { opacity: .25; } }

  /* bottom bar - black printstream bar with chrome text + holo top edge */
  .bar { left: 0; right: 0; bottom: 0; height: 48px; display: flex; align-items: center; background: #0d0d0f; box-shadow: 0 0 14px rgba(0,0,0,.5); }
  .bar::before { content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 3px;
                 background: var(--holo); background-size: 300% 100%; animation: holo 6s linear infinite; }
  .bar .item { display: flex; align-items: center; gap: 9px; padding: 0 26px; font-weight: 700; letter-spacing: 1.5px; font-size: 18px; color: #fff; }
  .bar .item .k { font-family: 'Teko', sans-serif; font-weight: 700; font-size: 22px; }
  .bar .div { width: 1px; height: 22px; background: rgba(255,255,255,.25); }
  .bar .spacer { flex: 1; }
  .bar .socials { display: flex; gap: 24px; padding-right: 26px; font-weight: 700; letter-spacing: 1px; font-size: 17px; color: #d6d6da; }
  .bar .socials b { color: #fff; }
  .marq { overflow: hidden; max-width: 560px; }
  .marq .track { display: inline-block; white-space: nowrap; padding-left: 100%; animation: scrollx 16s linear infinite;
                 font-weight: 700; letter-spacing: 1px; font-size: 17px; color: #d6d6da; }
  @keyframes scrollx { to { transform: translateX(-100%); } }
</style>
</head>
<body>
  <div class="plate brand"><div class="mark"></div><div class="name">ZEVON</div></div>
  <div class="plate live"><div class="dot"></div><div class="txt">LIVE</div><div class="sep"></div><div class="ct">CS2 &middot; PREMIER</div></div>

  <div class="bar">
    <div class="item"><span class="k chrome">MAP</span><span>DE_MIRAGE</span></div>
    <div class="div"></div>
    <div class="item"><span class="k chrome">RANK</span><span>GLOBAL</span></div>
    <div class="div"></div>
    <div class="marq"><span class="track">Drop a follow if you are enjoying the stream &nbsp;&bull;&nbsp; !commands &nbsp;&bull;&nbsp; GLHF &nbsp;&bull;&nbsp; clutch or kick</span></div>
    <div class="spacer"></div>
    <div class="socials"><span>X <b>@zevon</b></span><span>YT <b>@zevoncs</b></span></div>
  </div>
</body>
</html>
