<!DOCTYPE html>
<!--
  Webcam frame - ACID PROTOCOL (kinetic brutalism: acid yellow / black / hazard tape)
  OBS: Browser Source, size + position to match your Webcam box, place ABOVE the
  Webcam source. Transparent center. Edit handle (ZEVON).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@500;600;700&display=swap');
  :root { --acid: #DFE104; --ink: #0a0a0a; --paper: #f5f5f0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

  /* hard black frame with acid offset block behind it */
  .offset { position: absolute; inset: 10px 0 0 10px; background: var(--acid); }
  .frame  { position: absolute; inset: 0 10px 10px 0; border: 5px solid var(--ink); }

  /* hazard tape strip running along the bottom of the frame */
  .tape { position: absolute; left: -5px; right: -5px; bottom: -5px; height: 16px; border: 3px solid var(--ink);
          background: repeating-linear-gradient(-45deg, var(--acid) 0 14px, var(--ink) 14px 28px);
          background-size: 40px 100%; animation: crawl 1.2s linear infinite; }
  @keyframes crawl { to { background-position: 40px 0; } }

  /* scrolling marquee strip on top edge */
  .marq { position: absolute; left: -5px; right: -5px; top: -5px; height: 22px; background: var(--ink);
          border: 3px solid var(--ink); overflow: hidden; display: flex; align-items: center; }
  .marq .track { display: flex; white-space: nowrap; animation: slide 9s linear infinite;
                 font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 13px;
                 letter-spacing: 2px; color: var(--acid); }
  .marq .track span { padding-right: 28px; }
  @keyframes slide { to { transform: translateX(-50%); } }

  /* rotated LIVE sticker */
  .sticker { position: absolute; top: 14px; left: -14px; transform: rotate(-7deg);
             background: var(--acid); border: 4px solid var(--ink); padding: 4px 12px;
             box-shadow: 5px 5px 0 var(--ink); display: flex; align-items: center; gap: 8px;
             animation: stamp 2.4s steps(1) infinite; }
  .sticker .dot { width: 10px; height: 10px; background: #e21c1c; border: 2px solid var(--ink); border-radius: 50%; }
  .sticker span { font-family: 'Russo One', sans-serif; font-size: 17px; color: var(--ink); letter-spacing: 2px; }
  @keyframes stamp { 0%,90%,100% { transform: rotate(-7deg) scale(1); } 94% { transform: rotate(-7deg) scale(1.08); } }

  /* handle plate bottom-right, hard shadow */
  .handle { position: absolute; bottom: 18px; right: -8px; transform: rotate(2deg);
            background: var(--ink); padding: 4px 14px; box-shadow: 5px 5px 0 var(--acid); }
  .handle span { font-family: 'Russo One', sans-serif; font-size: 18px; color: var(--paper); letter-spacing: 2px; }
  .handle b { color: var(--acid); }

  /* corner registration crosses */
  .reg { position: absolute; width: 18px; height: 18px; }
  .reg::before, .reg::after { content: ''; position: absolute; background: var(--ink); }
  .reg::before { left: 50%; top: 0; width: 3px; height: 100%; transform: translateX(-50%); }
  .reg::after  { top: 50%; left: 0; height: 3px; width: 100%; transform: translateY(-50%); }
  .reg.tr { top: 26px; right: 8px; }
  .reg.bl { bottom: 30px; left: 8px; }

  /* glitch tick on the whole frame */
  .jitter { position: absolute; inset: 0; animation: tick 7s steps(1) infinite; }
  @keyframes tick { 0%,96%,100% { transform: translate(0,0); } 97% { transform: translate(-2px,1px); } 98% { transform: translate(2px,-1px); } }
</style>
</head>
<body>
  <div class="jitter">
    <div class="offset"></div>
    <div class="frame">
      <div class="marq"><div class="track">
        <span>&#9679; ON AIR</span><span>&#9679; ZEVON</span><span>&#9679; NO MERCY</span><span>&#9679; CS2</span>
        <span>&#9679; ON AIR</span><span>&#9679; ZEVON</span><span>&#9679; NO MERCY</span><span>&#9679; CS2</span>
      </div></div>
      <div class="tape"></div>
      <div class="reg tr"></div><div class="reg bl"></div>
    </div>
    <div class="sticker"><div class="dot"></div><span>LIVE</span></div>
    <div class="handle"><span>@<b>ZEVON</b></span></div>
  </div>
</body>
</html>
