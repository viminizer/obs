<!DOCTYPE html>
<!--
  Animated tactical background - CS theme (purple/magenta)
  OBS: add as Browser Source 1920x1080, place at the BOTTOM of the scene
  (behind webcam / panels). Good for Just Chatting and Coding scenes.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: #07040d; }

  .bg { position: absolute; inset: 0; }

  /* deep radial vignette */
  .bg::before { content: ''; position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 50% 40%, #1a0b2e 0%, #0c0518 55%, #050309 100%); }

  /* moving perspective grid */
  .grid { position: absolute; left: -25%; right: -25%; bottom: -10%; height: 75%;
    background-image:
      linear-gradient(rgba(192,38,255,.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,43,214,.18) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(420px) rotateX(62deg);
    transform-origin: bottom center;
    animation: scroll 7s linear infinite;
    mask-image: linear-gradient(to top, #000 0%, transparent 80%);
    -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 80%);
  }
  @keyframes scroll { from { background-position: 0 0; } to { background-position: 0 60px; } }

  /* two drifting glow blobs */
  .blob { position: absolute; width: 720px; height: 720px; border-radius: 50%; filter: blur(90px); opacity: .35; }
  .blob.a { background: #c026ff; top: -180px; left: -120px; animation: drift1 16s ease-in-out infinite; }
  .blob.b { background: #ff2bd6; bottom: -220px; right: -140px; animation: drift2 19s ease-in-out infinite; }
  @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(120px,80px); } }
  @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-100px,-90px); } }

  /* slow scanlines */
  .lines { position: absolute; inset: 0; opacity: .5;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,.18) 3px 4px); }

  /* faint rotating crosshair watermark */
  .cross { position: absolute; top: 50%; left: 50%; width: 460px; height: 460px;
    transform: translate(-50%,-50%); opacity: .07; animation: spin 40s linear infinite; }
  .cross::before, .cross::after { content: ''; position: absolute; background: #fff; }
  .cross::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  .cross::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
  .ring { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; transform: translate(-50%,-50%);
    border: 2px solid #fff; border-radius: 50%; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
</style>
</head>
<body>
  <div class="bg">
    <div class="blob a"></div><div class="blob b"></div>
    <div class="grid"></div>
    <div class="cross"><div class="ring"></div></div>
    <div class="lines"></div>
  </div>
</body>
</html>
